spring.application.name=server

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:news_postgres}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgrespassword}

spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-bytes}
jwt.expiration=3600000
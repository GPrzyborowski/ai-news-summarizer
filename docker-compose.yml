services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: news_postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./server
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: news_postgres
      PGUSER: postgres
      PGPASSWORD: ${PGPASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: